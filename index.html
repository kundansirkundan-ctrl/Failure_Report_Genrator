<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&T Dhanbad : Failure Analysis Dashboard</title>
    <!-- Official SheetJS Stable Library -->
    <script type="text/javascript" src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    
   <style>
    /* --- DARKER SOFT-UI BASE --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
        font-family: 'Segoe UI', Roboto, sans-serif; 
        /* Thoda aur dark bluish-grey background */
        background-color: #cfd8e3; 
        color: #1e293b; 
        padding: 15px; 
    }

    .container { max-width: 1700px; margin: 0 auto; }

   /* =========================================================
   HEADER SECTION - DEEP BLUE SOFT UI
   ========================================================= */

.header { 
    background: linear-gradient(145deg, #162e7a, #1e40af);
    color: white; 
    padding: 12px 25px; 
    border-radius: 20px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    margin-bottom: 20px; 
    
    /* Neumorphic Pop-out Shadow (Matches Sidebars) */
    box-shadow: 8px 8px 16px #a6b1bd, 
                -4px -4px 12px #f8faff;
    
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
}

.header-content {
    text-align: left;
}

.header-title {
    font-size: 20px; /* Reduced from 22px to fit slim width */
    margin: 0; 
    font-weight: 800; 
    letter-spacing: 0.5px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

.header-subtitle {
    font-size: 13px; 
    opacity: 0.85; 
    margin-top: 2px;
    font-weight: 500;
}

/* Responsive adjustment for Mobile */
@media (max-width: 768px) {
    .header-title {
        font-size: 16px;
    }
    .header-subtitle {
        display: none; /* Mobile par subtitle hide taaki space bache */
    }
    .header {
        padding: 10px 15px;
    }
}


    /* --- INSET FILTER PANEL --- */
    .filter-panel { 
        background: #cfd8e3;
        padding: 25px; 
        border-radius: 20px; 
        display: flex; 
        flex-wrap: wrap; 
        gap: 20px; 
        box-shadow: inset 6px 6px 12px #a6b1bd, inset -6px -6px 12px #f8faff;
        margin-bottom: 25px; 
        align-items: flex-end;
    }

    .filter-group { flex: 1 1 200px; display: flex; flex-direction: column; }
    .filter-group label { font-size: 11px; font-weight: 700; color: #1e40af; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }

    /* Elevated Inputs */
    .filter-group input, .filter-group select { 
        height: 45px; 
        padding: 0 15px; 
        border: none; 
        border-radius: 12px; 
        font-size: 14px; 
        outline: none; 
        background: #cfd8e3;
        color: #0f172a;
        box-shadow: 5px 5px 10px #a6b1bd, -5px -5px 10px #f8faff;
        transition: all 0.2s ease;
    }

    .filter-group input:focus, .filter-group select:focus {
        box-shadow: inset 3px 3px 6px #a6b1bd, inset -3px -3px 6px #f8faff;
    }

    /* --- ANALYSIS CARDS --- */
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px; display: none; }

    .card { 
        background: #cfd8e3; 
        padding: 20px; 
        border-radius: 20px; 
        box-shadow: 10px 10px 20px #a6b1bd, -10px -10px 20px #f8faff;
    }

    .card-label { 
        font-size: 12px; 
        font-weight: 700; 
        color: #f01628; 
        margin-bottom: 15px; 
        padding-bottom: 8px;
        border-bottom: 2px solid rgba(30, 64, 175, 0.15);
        text-transform: uppercase; 
    }

    .item-row { 
        display: flex; 
        justify-content: space-between; 
        align-items: center; 
        font-size: 13px; 
        padding: 10px; 
        margin-bottom: 10px;
        background: #cfd8e3;
        border-radius: 12px; 
        box-shadow: 4px 4px 8px #a6b1bd, -4px -4px 8px #f8faff;
        cursor: pointer; 
        transition: all 0.2s ease;
    }

    /* Hover effect - Clickable Depth */
    .item-row:hover { 
        box-shadow: inset 3px 3px 7px #a6b1bd, inset -3px -3px 7px #f8faff;
        transform: translateY(1px);
        color: #1e40af;
    }

    .item-name { font-weight: 700; color: #1e293b; }

    /* High Contrast Badge */
    .item-count-badge { 
        background: #1e40af; 
        color: white !important; 
        padding: 4px 12px; 
        border-radius: 8px; 
        font-weight: 800; 
        font-size: 11px;
        box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    /* --- VIBRANT GENERATE BUTTON --- */
    .btn-gen { 
        background: #f59e0b; /* Amber/Orange */
        color: #0f172a; 
        border: none; 
        height: 45px; 
        padding: 0 35px; 
        border-radius: 12px; 
        font-weight: 900; 
        cursor: pointer; 
        box-shadow: 6px 6px 12px #a6b1bd, -6px -6px 12px #f8faff;
        transition: all 0.2s ease;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .btn-gen:hover { 
        background: #fbbf24;
        box-shadow: inset 4px 4px 8px #d97706, inset -4px -4px 8px #fbbf24; /* Button Depth Hover */
        transform: translateY(2px);
    }

    /* --- TABLE SECTION --- */
    .preview-card { 
        background: #cfd8e3; 
        border-radius: 20px; 
        display: none; 
        box-shadow: 12px 12px 24px #a6b1bd, -12px -12px 24px #f8faff;
        overflow: hidden; 
    }

    .table-header { padding: 20px 30px; background: rgba(0,0,0,0.03); border-bottom: 1px solid #a6b1bd; display: flex; justify-content: space-between; align-items: center; }

    .table-container { overflow-x: auto; max-height: 550px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th { background: #0f172a; color: #38bdf8; padding: 15px; text-transform: uppercase; letter-spacing: 1px; position: sticky; top: 0; z-index: 10; }

    tbody td { padding: 12px 15px; border-bottom: 1px solid #a6b1bd; color: #0f172a; font-weight: 500; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.3); }

    .remarks-cell { max-width: 240px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }

    .btn-action { height: 35px; padding: 0 15px; border-radius: 8px; border: none; color: white; cursor: pointer; font-size: 11px; font-weight: 800; box-shadow: 3px 3px 6px #a6b1bd, -3px -3px 6px #f8faff; }
    
    #loading { text-align: center; display: none; padding: 40px; font-weight: 800; color: #1e40af; font-size: 20px; text-shadow: 1px 1px 2px #f8faff; }
</style>




</head>
<body>

<div class="container">
    <div class="header">
    <!-- Left Side: Text Content -->
    <div class="header-content">
        <h2 class="header-title">S&T DHANBAD : FAILURE ANALYSIS ENGINE</h2>
        <p class="header-subtitle">Failure Insights Dashboard</p>
    </div>
    
    <!-- Right Side: Circular Logo -->
    <div style="flex-shrink: 0;">
        <img src="logo.png" 
             style="height: 75px; width: 75px; border-radius: 50%; border: 2px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); object-fit: cover;" 
             alt="S&T Logo">
    </div>
</div>
  
</div>

   

    <div class="filter-panel">
        <div class="filter-group"><label>From Date</label><input type="date" id="start"></div>
        <div class="filter-group"><label>To Date</label><input type="date" id="end"></div>
        <div class="filter-group"><label>Station</label><input type="text" id="station" placeholder="Code" style="text-transform:uppercase"></div>
        <div class="filter-group"><label>Officer</label>
       <select id="off">
          <option value="">All</option>
          <option>DSTE/DHN</option>
          <option>DSTE/W/DHN</option>
          <option>ASTE/DHN</option>
          <option>ASTE/GMO</option>
          <option>ASTE/KQR</option>
          <option>ASTE/BRKA</option>
          <option>ASTE/DTO</option>
          <option>DSTE/CPU</option>
       </select></div>
      
        <div class="filter-group"><label>Asset Make</label><select id="make_filter">
          <option value="">All</option>
          <option>CEL</option>
          <option>GGT</option>
          <option>SIEMNES</option>
          <option>ELDYNE</option>
          <option>TWS</option>
          <option>DELTRON</option>
          <option>FRAUSCHER</option>
          <option>WEBFIL</option>
       </select></div>
      
        <div class="filter-group"><label>ICMS Head</label><select id="icms_filter">
          <option value="">All</option>
          <option>S&T</option>
          <option>S&T Con</option>
          <option>MA</option>
          <option>MISC</option>
          <option>C&W</option>
          <option>Derailment</option>
          <option>Electric/G</option>
          <option>LC</option>
          <option>PBOL</option>
          <option>PRONI</option>
          <option>ENGG</option>
          <option>TRD</option>
          <option>INC</option>
          <option>WEA</option>
          <option>SF</option>
        </select></div>
      
      <div class="filter-group">
    <label>Gear</label>
    <select id="gear_filter">
        <option value="">All Gears</option>
        <option>POINT</option>
        <option>AXLE COUNTER</option>
        <option>MSDAC</option>
        <option>ADVANCE</option>
        <option>TRACK CIRCUIT</option>
        <option>HOME</option>
        <option>STARTER</option>
        <option>IPS</option>
        <option>UFSBI</option>
        <option>EI</option>
    </select>
</div>
      
        <div class="filter-group">
    <label>Specific Defect</label>
    <select id="defect_filter">
        <option value="">-- No Defect --</option>
        <option value="G/Joint Defective">G/Joint Defective</option>
        <option value="Cable defective">Cable Defective</option>
        <option value="Obstruction in point">Obstruction in Point</option>
        <option value="Iron chips">Iron Chips</option>
        <option value="Cable cut by Miscreant">Cable cut by Miscreant</option>
        <option value="Cable cut by S&T Con/Works">Cable cut by S&T Con/Works</option>
        <option value="Cable cut by Engg">Cable cut by Engg</option>
        <option value="Relay/Contact defective/High resistance">Relay/Contact defective</option>
        <option value="Water logging">Water logging</option>
        <option value="Fuse blown">Fuse blown</option>
    </select>
</div>
      
        <button onclick="fetchData()" class="btn-gen">GENERATE</button>
    </div>

    <div id="summaryGrid" class="summary-grid">
        <div class="card" style="border-top-color: #059669;"><div class="card-label">TOTAL RECORDS</div><div id="totalCount" style="font-size:42px; font-weight:900; color:#059669; margin-top:10px;">0</div></div>
        <div class="card"><div class="card-label">TOP 5 OFFICERS</div><div id="topOfficers"></div></div>
        <div class="card"><div class="card-label">TOP 5 STATIONS (High Failure Rate)</div><div id="topStations"></div></div>
        <div class="card"><div class="card-label">TOP 5 GEARS</div><div id="topGears"></div></div>
        <div class="card"><div class="card-label">TOP 5 ASSET MAKES</div><div id="topMakes"></div></div>
        <div class="card" style="border-top-color: #dc2626;"><div class="card-label">TOP 5 ICMS HEADS</div><div id="topICMS"></div></div>
    </div>

    <div id="loading">🔍 Analysing Dhanbad Database...</div>

    <div id="previewCard" class="preview-card">
        <div class="table-header">
            <h3 style="font-size:14px; font-weight: bold; color: #374151;">DETAILED FAILURE TABLE</h3>
            <button onclick="exportToExcel()" style="background:#059669; color:white; border:none; padding:8px 16px; border-radius:6px; font-size:12px; cursor:pointer; font-weight:bold;">📥 FULL EXCEL DOWNLOAD</button>
        </div>
        <div class="table-container">
            <table id="mainTable"><thead id="tHead"></thead><tbody id="tBody"></tbody></table>
        </div>
    </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyNUtRBJeFvF4mnSeX3I-iBiHX1hSYMWIr1SYFDimD0oTfkaqJWmiNZi3iRHdoYUbPA/exec';
var globalRows = [];
var globalHeaders = [];

async function fetchData() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('summaryGrid').style.display = 'none';
    document.getElementById('previewCard').style.display = 'none';

    var params = new URLSearchParams({
        start: document.getElementById('start').value, 
        end: document.getElementById('end').value,
        station: document.getElementById('station').value, 
        officer: document.getElementById('off').value, // Backend 'parameter.officer' ke liye
        make: document.getElementById('make_filter').value, // Backend 'parameter.make' ke liye
        icms: document.getElementById('icms_filter').value,
        gear: document.getElementById('gear_filter').value,
        defect: document.getElementById('defect_filter').value
    });

    try {
        var response = await fetch(SCRIPT_URL + '?' + params.toString());
        var data = await response.json();
        globalRows = data.rows;
        globalHeaders = data.headers;
        runAnalysis(data.rows);
        renderMainTable(data);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('summaryGrid').style.display = 'grid';
        document.getElementById('previewCard').style.display = 'block';
    } catch (e) { alert("Error fetching data!"); document.getElementById('loading').style.display = 'none'; }
}

function runAnalysis(rows) {
    var stats = { off: {}, stn: {}, gear: {}, make: {}, icms: {} };
    for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        countItem(stats.off, row[4]);
        countItem(stats.stn, row[3]);
        countItem(stats.gear, row[8]);
        countItem(stats.icms, row[11]);
        countItem(stats.make, row[14]);
    }
    document.getElementById('totalCount').innerText = rows.length;
    displayTop5('topOfficers', stats.off, 'Officer');
    displayTop5('topStations', stats.stn, 'Station');
    displayTop5('topGears', stats.gear, 'Gear');
    displayTop5('topMakes', stats.make, 'Asset Make', true);
    displayTop5('topICMS', stats.icms, 'ICMS Head');
}

function countItem(obj, val) {
    if (!val || val === '-' || val === '') return;
    obj[val] = (obj[val] || 0) + 1;
}

function displayTop5(id, obj, category, filterUnknown) {
    var items = Object.keys(obj).map(function(k) { return [k, obj[k]]; });
    if (filterUnknown) {
        items = items.filter(function(i) { return !i[0].toLowerCase().includes('unknown'); });
    }
    items.sort(function(a, b) { return b[1] - a[1]; });
    var top5 = items.slice(0, 5);
    document.getElementById(id).innerHTML = top5.map(function(item) {
        return '<div class="item-row" onclick="exportCategory(\'' + category + '\', \'' + item[0] + '\')">' +
               '<span class="item-name">' + item[0] + '</span>' +
               '<div style="display:flex; align-items:center; gap:10px;">' +
               '<span style="font-weight:bold; color:#1e40af;">' + item[1] + '</span>' +
               '<div class="dl-icon">↓</div></div></div>';
    }).join('') || "<p style='font-size:11px;color:#999;padding:10px;'>No data</p>";
}

function exportCategory(category, value) {
    var colMap = { 'Officer': 4, 'Station': 3, 'Gear': 8, 'ICMS Head': 11, 'Asset Make': 14 };
    var idx = colMap[category];
    var filtered = globalRows.filter(function(r) { return String(r[idx]).trim() === String(value).trim(); });
    var sheetData = [globalHeaders];
    for (var i = 0; i < filtered.length; i++) {
        var row = Array.from(filtered[i]);
        row[0] = i + 1;
        sheetData.push(row);
    }
    var ws = XLSX.utils.aoa_to_sheet(sheetData);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Report");
    XLSX.writeFile(wb, "Report_" + category + "_" + value + ".xlsx");
}

function renderMainTable(data) {
    document.getElementById('tHead').innerHTML = '<tr>' + data.headers.map(h => '<th>' + h + '</th>').join('') + '</tr>';
    document.getElementById('tBody').innerHTML = data.rows.map((row, i) => 
        '<tr>' + row.map((c, j) => '<td class="' + (j === 9 ? 'remarks-cell' : '') + '" title="' + (j === 9 ? c : '') + '">' + (j === 0 ? i+1 : c || '-') + '</td>').join('') + '</tr>').join('');
}

function exportToExcel() {
    var table = document.getElementById('mainTable');
    XLSX.writeFile(XLSX.utils.table_to_book(table), "Full_S&T_Report.xlsx");
}
</script>
</body>
</html>
